[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

[bell]
command = { program = "osascript", args = ["-e", "display notification \"Task complete\" with title \"Alacritty\""] }

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 13
offset.y = 4

[window]
decorations = "Full"
option_as_alt = "OnlyLeft"

[keyboard]
bindings = [
  { key = "Return", mods = "Shift", chars = "\u001B\r" },
]

[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.cursor]
text = "#282828"
cursor = "#ebdbb2"

[colors.vi_mode_cursor]
text = "#282828"
cursor = "#ebdbb2"

[colors.search.matches]
foreground = "#282828"
background = "#d79921"

[colors.search.focused_match]
foreground = "#282828"
background = "#cc241d"

[colors.selection]
text = "#ebdbb2"
background = "#504945"

[colors.normal]
black = "#282828"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"

[colors.bright]
black = "#928374"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
magenta = "#d3869b"
cyan = "#8ec07c"
white = "#ebdbb2"
