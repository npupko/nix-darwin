# Pane navigation
bind-key h   select-pane -L
bind-key C-h select-pane -L
bind-key j   select-pane -D
bind-key C-j select-pane -D
bind-key k   select-pane -U
bind-key C-k select-pane -U
bind-key l   select-pane -R
bind-key C-l select-pane -R

# Splits
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"
bind-key "%" split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -fh -c "#{pane_current_path}"
bind-key "'" split-window -h -c "#{pane_current_path}"

# Alt+number window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Send prefix to nested tmux
bind C-a send-prefix

# Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"

# Resize panes
bind-key -r H resize-pane -L "5"
bind-key -r J resize-pane -D "5"
bind-key -r K resize-pane -U "5"
bind-key -r L resize-pane -R "5"

# Windows
bind-key "c" new-window -c "#{pane_current_path}"
bind-key -r "<" swap-window -t -1 \; select-window -t -1
bind-key -r ">" swap-window -t +1 \; select-window -t +1

# Copy mode
setw -g mode-keys vi
bind C-b copy-mode -u
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode MouseDragEnd1Pane
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer

# Bell — pass through to terminal for notifications (e.g. Claude Code)
set -g bell-action any
set -g visual-bell off

# General
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Statusbar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Pane bindings (testing)
bind-key x kill-pane

# Window bindings (testing)
# kill-window unbound to avoid accidental Ctrl+A,k kills
bind-key r command-prompt "rename-window '%%'"

# Session bindings (testing)
bind-key C new-session
# bind-key K kill-session
bind-key R command-prompt "rename-session '%%'"
bind-key N switch-client -n
bind-key P switch-client -p
bind -n M-Up switch-client -n
bind -n M-Down switch-client -p
bind -n M-Left previous-window
bind -n M-Right next-window

# Voxtype: real-time voice typing status indicator
run-shell -b 'voxtype-tmux'
